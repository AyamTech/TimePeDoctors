workflows:
  android-release:
    name: Android Release
    environment:
      groups:
        # Create these groups in Codemagic UI (App settings > Environment variables)
        # android_config:
        #   ENV_FILE_CONTENT              contents of assets/.env
        #   GOOGLE_SERVICES_JSON_BASE64   base64 of android/app/google-services.json
        - android_config
        # android_keystore:
        #   CM_KEYSTORE            base64 of the release .jks keystore file
        #   CM_KEYSTORE_PASSWORD   keystore password (plain text)
        #   CM_KEY_ALIAS           key alias (plain text)
        #   CM_KEY_PASSWORD        key password (plain text)
        - android_keystore
      flutter: stable
    cache:
      cache_paths:
        - $HOME/.pub-cache
    scripts:
      - name: Set up assets/.env
        script: |
          echo "$ENV_FILE_CONTENT" > assets/.env
      - name: Set up google-services.json
        script: |
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
      - name: Set up Android keystore
        script: |
          KEYSTORE_PATH="$CM_BUILD_DIR/keystore.jks"
          echo "$CM_KEYSTORE" | base64 --decode > "$KEYSTORE_PATH"
          echo "CM_KEYSTORE_PATH=$KEYSTORE_PATH" >> $CM_ENV
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Build AAB and APK
        script: |
          flutter build appbundle --release
          flutter build apk --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/mapping/release/mapping.txt
    publishing:
      email:
        recipients:
          - abhishekmathur2019@gmail.com
        notify:
          success: true
          failure: true
