workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        # Create this group in Codemagic UI (Teams > Environment variables)
        # with: ENV_FILE_CONTENT (contents of assets/.env)
        #       GOOGLE_SERVICES_JSON_BASE64 (base64 of android/app/google-services.json)
        - android_config
      android_signing:
        # Name of the keystore reference created in Codemagic UI
        # (App settings > Code signing identities > Android keystores)
        - timepe_keystore
      flutter: stable
    cache:
      cache_paths:
        - $HOME/.pub-cache
    scripts:
      - name: Set up assets/.env
        script: |
          echo "$ENV_FILE_CONTENT" > assets/.env
      - name: Set up google-services.json
        script: |
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Build AAB and APK
        script: |
          flutter build appbundle --release
          flutter build apk --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/mapping/release/mapping.txt
    publishing:
      email:
        recipients:
          - abhishekmathur2019@gmail.com
        notify:
          success: true
          failure: true
