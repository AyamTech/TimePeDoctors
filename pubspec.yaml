name: timepe_doctors
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.5+202604031700

environment:
  sdk: ^3.6.2

dependencies:
  permission_handler: ^11.0.0
  flutter:
    sdk: flutter

  sendotp_flutter_sdk: ^0.0.1
  geolocator: ^10.1.0
  provider: ^6.1.2
  intl: ^0.17.0
  flutter_dotenv: ^5.1.0
  qr_flutter: ^4.0.0
  cupertino_icons: ^1.0.8
  http: ^1.3.0
  shared_preferences: ^2.5.2
  cached_network_image: ^3.2.3
  jwt_decoder: ^2.0.1
  firebase_messaging: ^15.0.0  # or latest stable version
  firebase_messaging_web: ^3.8.0  # or latest compatible version
  flutter_local_notifications: ^19.0.0
  socket_io_client: ^3.1.2
  js: ^0.6.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.2.5
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0
  pin_code_fields: ^8.0.0

flutter_native_splash:
  image: assets/splash.png
  android: true
  ios: true
  color: "#ffffff"
  web: true
  fullscreen: true
  android_gravity: fill
  ios_content_mode: scaleToFill

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:

  uses-material-design: true
  assets:
    - assets/.env
    - assets/images/google.png
    - assets/images/apple.png
    - assets/images/facebook.png
    - assets/images/email.png
    - assets/images/contact.png
    - assets/images/schedule_image.png
    - assets/images/bg-header.jpg
    - assets/images/careslot-icon-text.png
    - assets/images/location-check-in.png
    - assets/images/location-not-check.png
    - assets/splash.png
    - assets/bar-icons/home_active.png
    - assets/bar-icons/home_inactive.png
    - assets/bar-icons/schedule_active.png
    - assets/bar-icons/schedule_inactive.png
    - assets/bar-icons/notification_active.png
    - assets/bar-icons/notification_inactive.png
    - assets/bar-icons/contact_active.png
    - assets/bar-icons/contact_inactive.png
    - assets/images/location-outline.png
    - assets/images/global.png
    - assets/images/sms.png
    - assets/images/phone.png
    - assets/images/clock-outline.png
    - assets/images/calendar-outline.png
    - assets/images/call-outline.png
    - assets/images/profile-icon.png
    - assets/images/tea-break.png
    - assets/images/add-patient.png
    - assets/images/symptoms-icon.png
    - assets/images/patient_icon.png
    - assets/images/doctor_image.png
    - assets/images/otp_illustration.png
    - assets/images/time_icon_image.png


fonts:
- family: Poppins
  fonts:
    - asset: assets/fonts/Poppins-Regular.ttf
    - asset: assets/fonts/Poppins-Medium.ttf
    - asset: assets/fonts/Poppins-SemiBold.ttf
    - asset: assets/fonts/Poppins-Bold.ttf
      weight: 700
